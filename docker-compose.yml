services:
  postgres:
    image: postgres:16
    container_name: itsm-postgres
    environment:
      POSTGRES_DB: itsm
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d itsm"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: ITSM/Dockerfile
    container_name: itsm-web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AUTO_MIGRATE: "true"
      SEED_DEMO: "true"
      ENABLE_HTTPS_REDIRECT: "false"
      DATA_PROTECTION_KEYS_PATH: "/app/keys"
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=itsm;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "8080:8080"
    volumes:
      - keys_data:/app/keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  keys_data:
